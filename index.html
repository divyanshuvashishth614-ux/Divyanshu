<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Gaming Sticker Shop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f4f4;
        }
        header {
            background: #333;
            color: #fff;
            padding: 10px 0;
            text-align: center;
        }
        .hero {
            background: url('hero-image.jpg') no-repeat center center/cover;
            height: 400px;
            text-align: center;
            color: white;
        }
        .hero h1 {
            margin: 0;
            padding-top: 150px;
            font-size: 50px;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .product {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        .product img {
            width: 100%;
            border-radius: 5px;
        }
        .product h2 {
            font-size: 20px;
        }
        .cart {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Modern Gaming Sticker Shop</h1>
    </header>
    <section class="hero">
        <h1>Welcome to Our Sticker Store!</h1>
    </section>
    <section class="product-grid">
        <div class="product">
            <img src="sticker1.jpg" alt="Sticker 1">
            <h2>Sticker 1</h2>
            <button onclick="addToCart('Sticker 1')">Add to Cart</button>
        </div>
        <div class="product">
            <img src="sticker2.jpg" alt="Sticker 2">
            <h2>Sticker 2</h2>
            <button onclick="addToCart('Sticker 2')">Add to Cart</button>
        </div>
        <!-- Add more product items as needed -->
    </section>
    <div class="cart">
        <h2>Your Shopping Cart</h2>
        <ul id="cart-items"></ul>
        <p>Total: <span id="total-price">$0.00</span></p>
    </div>
    <script>
        let cart = [];
        let total = 0;

        function addToCart(item) {
            cart.push(item);
            total += 10; // Assume each sticker costs $10
            updateCart();
        }

        function updateCart() {
            document.getElementById('cart-items').innerHTML = '';
            cart.forEach((item) => {
                let li = document.createElement('li');
                li.textContent = item;
                document.getElementById('cart-items').appendChild(li);
            });
            document.getElementById('total-price').textContent = '$' + total.toFixed(2);
        }
    </script>
</body>
</html>
